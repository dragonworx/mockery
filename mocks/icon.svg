<svg width="128" height="128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#gradient)"/>

  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Network/Request Icon -->
  <circle cx="64" cy="40" r="8" fill="white" opacity="0.9"/>
  <circle cx="40" cy="88" r="8" fill="white" opacity="0.9"/>
  <circle cx="88" cy="88" r="8" fill="white" opacity="0.9"/>

  <!-- Connection lines -->
  <line x1="64" y1="48" x2="40" y2="80" stroke="white" stroke-width="3" opacity="0.7"/>
  <line x1="64" y1="48" x2="88" y2="80" stroke="white" stroke-width="3" opacity="0.7"/>

  <!-- Mock indicator (play/redirect symbol) -->
  <polygon points="54,58 54,74 72,66" fill="#4caf50"/>
</svg>
